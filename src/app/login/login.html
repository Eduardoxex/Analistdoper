        </ul>

</header>
<section id="login">
    <h2>Login</h2>
    <p>Por favor, introduce tus credenciales para iniciar sesión.</p>
    <div>
        <form #loginForm="ngForm" (ngSubmit)="logear(loginForm)">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" ngModel required placeholder="UserName">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" ngModel required placeholder="Password">
            <button type="submit" [disabled]="!loginForm.valid">Iniciar sesión</button>
        </form>
    </div>
</section>
